<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upasana Chandrika</title>

<style>
/* ===== Global Reset ===== */
* {
  box-sizing: border-box; /* మొబైల్ ఫిట్టింగ్ కోసం ఇది ముఖ్యం */
}

body {
  font-family: Arial, sans-serif;
  background-color: #F4F7F6;
  margin: 0;
  padding: 0;
  color: #333;
  overflow-x: hidden; /* పక్కకు స్క్రోల్ అవ్వకుండా */
}

/* ===== Top Pink Navigation ===== */
.top-header-nav {
  background-color: #C2185B;
  padding: 12px 0;
  overflow-x: auto;
  white-space: nowrap;
  display: flex;
  scrollbar-width: none;
}
.top-header-nav::-webkit-scrollbar { display: none; }

.nav-links-container {
  display: flex;
  gap: 12px;
  padding: 0 15px;
}

.nav-links-container a {
  text-decoration: none;
  color: #C2185B;
  background-color: white;
  font-weight: bold;
  font-size: 14px;
  padding: 8px 18px;
  border-radius: 5px;
}

/* ===== Channel Name Section ===== */
.site-title-box {
  background-color: #FFFDE7;
  padding: 30px 10px;
  text-align: center;
  border-bottom: 4px solid #FFD600;
}

.site-title-box h1 {
  color: #C2185B;
  margin: 0;
  font-size: 24px;
  line-height: 1.3;
}

/* ===== Page Numbers Scroll ===== */
.page-nav-section {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 0;
  background: white;
}

.scroll-btn {
  background-color: #C2185B;
  color: white;
  border: none;
  border-radius: 4px;
  padding: 8px 12px;
  cursor: pointer;
}

.numbers-wrapper {
  display: flex;
  overflow-x: auto;
  white-space: nowrap;
  gap: 8px;
  padding: 5px 15px;
  max-width: 75%;
  scrollbar-width: none;
}
.numbers-wrapper::-webkit-scrollbar { display: none; }

.numbers-wrapper a {
  text-decoration: none;
  color: #C2185B;
  font-weight: bold;
  border: 1px solid #C2185B;
  padding: 6px 14px;
  border-radius: 4px;
  font-size: 14px;
}

.numbers-wrapper a.active {
  background-color: #C2185B;
  color: white;
}

/* ===== Content Box (Responsive Fix) ===== */
.main-content-card {
  max-width: 90%; /* మొబైల్ కోసం */
  width: 850px;
  margin: 50px auto;
  background-color: #FFFDE7;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  min-height: 350px;
  position: relative;
  color: #5C2E00;
}

/* Round Badge */
.badge-pos {
  display: flex;
  justify-content: center;
  margin-top: -55px;
  margin-bottom: 25px;
}
.round-badge {
  background-color: #C2185B;
  color: white;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  border: 4px solid #F4F7F6;
}

.page-text-content { 
  font-size: 19px; 
  text-align: center; 
  word-wrap: break-word; /* టెక్స్ట్ బయటకు వెళ్లకుండా */
}

/* ===== Coming Soon Style (Mobile Fix) ===== */
.coming-soon-container {
  background-color: #C2185B;
  color: white;
  padding: 40px 15px;
  border-radius: 12px;
  text-align: center;
  width: 100%; /* బాక్స్ వెడల్పు సరిచేయడానికి */
}
.coming-soon-container h2 { 
  color: white !important; 
  font-size: 28px; 
  margin-top: 0;
}

/* ===== Nav Buttons ===== */
.bottom-nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 0;
}
.nav-btn {
  background-color: #C2185B;
  color: white;
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 25px;
  font-weight: bold;
  font-size: 14px;
}

/* ===== Footer ===== */
.footer {
  background-color: #0D1B3D;
  color: white;
  text-align: center;
  padding: 30px;
  margin-top: 50px;
}
</style>
</head>

<body>

<nav class="top-header-nav">
  <div class="nav-links-container">
    <a href="/Upasana-Chandrika/">Home</a>
    <a href="/Omnnbc/">Main Site</a>
    <a href="/Dasabodha/">Dasabodha</a>
  </div>
</nav>

<div class="site-title-box">
  <h1>Namo Narayanaya<br>Bhakthi Channel</h1>
</div>

<div class="page-nav-section">
  <button class="scroll-btn" onclick="sideScroll(-150)">&#10094;</button>
  <div class="numbers-wrapper" id="pagination"></div>
  <button class="scroll-btn" onclick="sideScroll(150)">&#10095;</button>
</div>

<main class="main-content-card">
  <div class="badge-pos">
    <div class="round-badge" id="current-page">1</div>
  </div>
  
  <div id="content" class="page-text-content">Loading Content...</div>

  <div class="bottom-nav" id="bottom-nav"></div>
</main>

<footer class="footer">
  © 2026 Namo Narayanaya Bhakthi Channel | All Rights Reserved
</footer>

<script>
const totalPages = 143;
const contentDiv = document.getElementById("content");
const paginationDiv = document.getElementById("pagination");
const pageBadge = document.getElementById("current-page");
const btmNav = document.getElementById("bottom-nav");

let page = new URLSearchParams(window.location.search).get("page") || 1;
page = parseInt(page);

function loadPage(p) {
  pageBadge.innerText = p;
  fetch("pages/page" + p + ".html")
    .then(res => {
      if (!res.ok) throw new Error();
      return res.text();
    })
    .then(data => {
      contentDiv.innerHTML = data;
      updateButtons();
    })
    .catch(() => {
      // Coming Soon Box Fix for Mobile
      contentDiv.innerHTML = `
        <div class="coming-soon-container">
          <h2>Coming Soon</h2>
          <p>This content is being prepared.</p>
        </div>`;
      updateButtons();
    });
}

for (let i = 1; i <= totalPages; i++) {
  const a = document.createElement("a");
  a.href = "?page=" + i;
  a.innerText = i;
  if (i === page) a.className = "active";
  paginationDiv.appendChild(a);
}

function sideScroll(d) { paginationDiv.scrollBy({ left: d, behavior: 'smooth' }); }

function updateButtons() {
  btmNav.innerHTML = `
    ${page > 1 ? `<a href="?page=${page-1}" class="nav-btn">Previous</a>` : '<div></div>'}
    ${page < totalPages ? `<a href="?page=${page+1}" class="nav-btn">Next</a>` : '<div></div>'}
  `;
}

document.addEventListener("DOMContentLoaded", () => {
  loadPage(page);
  const active = document.querySelector(".active");
  if (active) active.scrollIntoView({ behavior: "smooth", inline: "center" });
});
</script>

</body>
</html>
