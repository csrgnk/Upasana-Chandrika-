<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upasana Chandrika</title>

<style>
/* ===== Body & Background ===== */
body {
  font-family: 'Noto Sans Telugu', sans-serif;
  background-color: #FFFDF7;
  margin: 0;
  color: #5C2E00;
  line-height: 1.8;
}

/* ===== Main Header (Light Yellow) ===== */
.main-header {
  background-color: #FFFDE7; /* Light Yellow Background */
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #FFECB3;
  flex-wrap: wrap;
}

/* Site Name (Pink) */
.site-name {
  color: #E91E63; /* Pink Color */
  font-size: 24px;
  font-weight: bold;
  text-decoration: none;
}

/* Top Menu Links (Pink Box Model) */
.top-nav {
  display: flex;
  gap: 10px;
}

.top-nav a {
  text-decoration: none;
  color: white;
  background-color: #E91E63; /* Pink Box */
  font-weight: bold;
  font-size: 14px;
  padding: 6px 15px;
  border-radius: 5px;
  transition: 0.3s;
}

.top-nav a:hover {
  background-color: #C2185B; /* Darker Pink on Hover */
}

/* ===== Book Title Bar (Orange) ===== */
.book-menu-bar {
  background-color: #FF9800;
  color: white;
  text-align: center;
  padding: 12px;
  font-size: 22px;
  font-weight: bold;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* ===== Content Area ===== */
.content-box {
  max-width: 850px;
  margin: 30px auto;
  padding: 25px;
  background: #ffffff;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.06);
  font-size: 19px;
  min-height: 450px;
}

/* ===== Footer ===== */
.footer {
  background: #0D1B3D;
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 50px;
}

/* Mobile Adjustments */
@media (max-width: 600px) {
  .main-header { text-align: center; justify-content: center; flex-direction: column; gap: 15px; }
  .top-nav { flex-wrap: wrap; justify-content: center; }
}
</style>
</head>

<body>

<header class="main-header">
  <a href="/Upasana-Chandrika/" class="site-name">Namo Narayanaya Bhakthi Channel</a>
  
  <nav class="top-nav">
    <a href="/Upasana-Chandrika/">Home</a>
    <a href="/Omnnbc/">Main Site</a>
    <a href="/Dasabodha/">Dasabodha</a>
  </nav>
</header>

<div class="book-menu-bar">
  Upasana Chandrika
</div>

<main class="content-box">
  <p style="text-align:center;">శ్రీ ఉపాసన చంద్రికా గ్రంథం లోడ్ అవుతోంది...</p>
</main>

<footer class="footer">
  © 2026 Namo Narayanaya Bhakthi Channel | All Rights Reserved
</footer>

</body>
</html>
