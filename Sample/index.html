<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upasana Chandrika</title>

<style>
/* ===== Body & Background ===== */
body {
  font-family: 'Noto Sans Telugu', sans-serif;
  background-color: #FFFDF7;
  margin: 0;
  color: #333;
}

/* ===== Header (Light Yellow) ===== */
.header-container {
  background-color: #FFFDE7;
  padding: 20px 10px;
  text-align: center;
  border-bottom: 1px solid #FFECB3;
}

/* Site Name - Two Lines */
.site-name {
  color: #E91E63; /* Pink */
  font-size: 26px;
  font-weight: bold;
  text-decoration: none;
  line-height: 1.2;
  display: block;
  margin-bottom: 15px;
}

.site-name span {
  display: block; /* రెండో లైన్ కోసం */
}

/* ===== Scrollable Menu Setup ===== */
.menu-scroll-wrapper {
  overflow-x: auto; /* పక్కకు స్క్రోల్ అవ్వడానికి */
  white-space: nowrap;
  padding: 10px 0;
  width: 100%;
  -webkit-overflow-scrolling: touch;
}

/* స్క్రోల్ బార్ కనిపించకుండా ఉండటానికి */
.menu-scroll-wrapper::-webkit-scrollbar {
  display: none;
}

.top-nav {
  display: inline-flex;
  gap: 10px;
  padding: 0 15px;
}

.top-nav a {
  text-decoration: none;
  color: #E91E63;
  font-weight: bold;
  font-size: 14px;
  padding: 7px 18px;
  border: 1px solid #E91E63; /* Single Line Border Box */
  border-radius: 4px;
  display: inline-block;
}

/* ===== Sub-Title (Curved Pink Box) ===== */
.sub-title-area {
  text-align: center;
  margin: 25px 0;
}

.curved-box {
  background-color: #E91E63;
  color: white;
  padding: 10px 35px;
  border-radius: 50px;
  font-size: 20px;
  font-weight: bold;
  display: inline-block;
}

/* ===== Content Box ===== */
.main-content {
  max-width: 900px;
  margin: 0 auto 50px auto;
  padding: 20px;
  background: #ffffff;
  border-radius: 10px;
  min-height: 400px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* ===== Footer (Blue) ===== */
.footer-box {
  background-color: #0D1B3D;
  color: white;
  text-align: center;
  padding: 30px;
}
</style>
</head>

<body>

<header class="header-container">
  <a href="/Upasana-Chandrika/" class="site-name">
    Namo Narayanaya 
    <span>Bhakthi Channel</span>
  </a>
  
  <div class="menu-scroll-wrapper">
    <nav class="top-nav">
      <a href="/Upasana-Chandrika/">Home</a>
      <a href="/Omnnbc/">Main Site</a>
      <a href="/Dasabodha/">Dasabodha</a>
    </nav>
  </div>
</header>

<div class="sub-title-area">
  <div class="curved-box">
    Upasana Chandrika
  </div>
</div>

<main class="main-content">
  <div style="text-align: center; padding-top: 50px;">
    శ్రీ ఉపాసన చంద్రికా గ్రంథం లోడ్ అవుతోంది...
  </div>
</main>

<footer class="footer-box">
  © 2026 Namo Narayanaya Bhakthi Channel | All Rights Reserved
</footer>

</body>
</html>
